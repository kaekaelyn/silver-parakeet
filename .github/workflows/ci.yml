name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync
      - name: Install chromium for filler tests
        run: uv run playwright install --with-deps chromium
      - name: Lint
        run: make lint
      - name: Test
        run: make test

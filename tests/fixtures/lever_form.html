<!doctype html>
<html>
<head><title>Apply - Frontend Engineer - Pied Piper</title></head>
<body>
<form id="application-form" action="#">
  <div class="application-question">
    <div class="application-label">Full name ✱</div>
    <div class="application-field"><input type="text" name="name" required></div>
  </div>
  <div class="application-question">
    <div class="application-label">Email ✱</div>
    <div class="application-field"><input type="email" name="email" required></div>
  </div>
  <div class="application-question">
    <div class="application-label">Phone</div>
    <div class="application-field"><input type="tel" name="phone"></div>
  </div>
  <div class="application-question">
    <div class="application-label">Current company</div>
    <div class="application-field"><input type="text" name="org"></div>
  </div>
  <div class="application-question">
    <div class="application-label">Resume ✱</div>
    <div class="application-field"><input type="file" name="resume" required></div>
  </div>
  <div class="application-question">
    <div class="application-label">LinkedIn URL</div>
    <div class="application-field"><input type="text" name="urls[LinkedIn]"></div>
  </div>
  <div class="application-question">
    <div class="application-label">GitHub URL</div>
    <div class="application-field"><input type="text" name="urls[GitHub]"></div>
  </div>
  <div class="application-question">
    <div class="application-label">Portfolio URL</div>
    <div class="application-field"><input type="text" name="urls[Portfolio]"></div>
  </div>
  <div class="application-question">
    <div class="application-label">How many years of Python experience do you have? ✱</div>
    <div class="application-field"><input type="text" name="cards[abc123][field0]" required></div>
  </div>
  <div class="application-question">
    <div class="application-label">Are you authorized to work in the United States? ✱</div>
    <div class="application-field">
      <label><input type="radio" name="cards[abc123][field1]" value="yes" required> Yes</label>
      <label><input type="radio" name="cards[abc123][field1]" value="no"> No</label>
    </div>
  </div>
  <div class="application-question">
    <div class="application-label">Additional information</div>
    <div class="application-field"><textarea name="comments"></textarea></div>
  </div>
  <button type="submit" id="btn-submit">Submit application</button>
</form>
<script>
  document.getElementById('application-form').addEventListener('submit', function (e) {
    e.preventDefault();
    // Concatenated so the marker phrase is absent from the unsubmitted source.
    document.body.innerHTML = '<div class="confirmation"><h2>Your application has been ' +
      'received!</h2></div>';
  });
</script>
</body>
</html>

<!doctype html>
<html>
<head><title>Software Engineer, Backend - Hooli</title></head>
<body>
<div id="application">
  <h1>Software Engineer, Backend</h1>
  <form id="application_form" action="#">
    <div class="field">
      <label for="first_name">First Name *</label>
      <input type="text" id="first_name" name="job_application[first_name]" required>
    </div>
    <div class="field">
      <label for="last_name">Last Name *</label>
      <input type="text" id="last_name" name="job_application[last_name]" required>
    </div>
    <div class="field">
      <label for="email">Email *</label>
      <input type="email" id="email" name="job_application[email]" required>
    </div>
    <div class="field">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="job_application[phone]">
    </div>
    <div class="field">
      <label for="resume">Resume/CV *</label>
      <input type="file" id="resume" name="job_application[resume]" required>
    </div>
    <div class="field">
      <label for="cover_letter_text">Cover Letter</label>
      <textarea id="cover_letter_text" name="job_application[cover_letter_text]"></textarea>
    </div>
    <div class="field">
      <label for="answer_0">LinkedIn Profile</label>
      <input type="text" id="answer_0" name="job_application[answers_attributes][0][text_value]">
    </div>
    <div class="field">
      <label for="answer_1">What are your salary expectations? *</label>
      <input type="text" id="answer_1" name="job_application[answers_attributes][1][text_value]" aria-required="true">
    </div>
    <div class="field">
      <label for="answer_2">Will you now or in the future require visa sponsorship? *</label>
      <select id="answer_2" name="job_application[answers_attributes][2][text_value]" required>
        <option value=""></option>
        <option>Yes</option>
        <option>No</option>
      </select>
    </div>
    <div class="field">
      <label for="answer_3">Describe your experience with distributed hamster herding *</label>
      <input type="text" id="answer_3" name="job_application[answers_attributes][3][text_value]" required>
    </div>
    <fieldset class="demographic">
      <legend>What is your gender?</legend>
      <label><input type="radio" name="job_application[gender]" value="1"> Male</label>
      <label><input type="radio" name="job_application[gender]" value="2"> Female</label>
      <label><input type="radio" name="job_application[gender]" value="3"> Decline To Self Identify</label>
    </fieldset>
    <input type="submit" id="submit_app" value="Submit Application">
  </form>
</div>
<script>
  document.getElementById('application_form').addEventListener('submit', function (e) {
    e.preventDefault();
    // Confirmation text is concatenated so the page *source* never contains
    // the marker phrase before a real submission happens.
    document.body.innerHTML = '<div id="confirmation"><h2>Thank you for ' + 'applying!</h2>' +
      '<p>Your application for Software Engineer, Backend was received.</p></div>';
  });
  if (window.location.search.indexOf('auto=1') !== -1) {
    // Test harness: simulate the human clicking Submit during review.
    setTimeout(function () { document.getElementById('submit_app').click(); }, 800);
  }
</script>
</body>
</html>

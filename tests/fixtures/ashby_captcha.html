<!doctype html>
<html>
<head><title>Apply — Aviato</title></head>
<body>
<div class="ashby-application-form-container">
  <form id="application-form" class="ashby-application-form" action="#">
    <label class="ashby-application-form-question-title" for="_systemfield_name">Name *</label>
    <input type="text" id="_systemfield_name" required>
    <label class="ashby-application-form-question-title" for="_systemfield_email">Email *</label>
    <input type="email" id="_systemfield_email" required>
    <div class="h-captcha" data-sitekey="fake"></div>
    <button type="submit" class="ashby-application-form-submit-button">Submit Application</button>
  </form>
</div>
</body>
</html>

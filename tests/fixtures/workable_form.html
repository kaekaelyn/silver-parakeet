<!doctype html>
<html>
<head><title>Platform Engineer - Raviga - Workable</title></head>
<body>
<main data-ui="application-form-page">
  <h1>Platform Engineer</h1>
  <form id="application-form" data-ui="application-form" action="#">
    <div class="field">
      <label for="firstname">First name <span class="required">*</span></label>
      <input type="text" id="firstname" name="firstname" data-ui="firstname" required>
    </div>
    <div class="field">
      <label for="lastname">Last name <span class="required">*</span></label>
      <input type="text" id="lastname" name="lastname" data-ui="lastname" required>
    </div>
    <div class="field">
      <label for="email">Email <span class="required">*</span></label>
      <input type="email" id="email" name="email" data-ui="email" required>
    </div>
    <div class="field">
      <label for="phone">Phone</label>
      <input type="tel" id="phone" name="phone" data-ui="phone">
    </div>
    <div class="field">
      <label for="headline">Headline</label>
      <input type="text" id="headline" name="headline" data-ui="headline">
    </div>
    <div class="field">
      <label for="resume">Resume <span class="required">*</span></label>
      <input type="file" id="resume" name="resume" data-ui="resume" required>
    </div>
    <div class="field">
      <label for="cover_letter">Cover letter</label>
      <textarea id="cover_letter" name="cover_letter" data-ui="cover_letter"></textarea>
    </div>
    <div class="field">
      <label for="QA_0001">How many years of Python experience do you have? <span class="required">*</span></label>
      <input type="text" id="QA_0001" name="QA_0001" aria-required="true">
    </div>
    <div class="field">
      <label for="QA_0002">Will you now or in the future require visa sponsorship? <span class="required">*</span></label>
      <select id="QA_0002" name="QA_0002" required>
        <option value=""></option>
        <option>Yes</option>
        <option>No</option>
      </select>
    </div>
    <div class="field">
      <label for="QA_0003">Describe your experience with distributed hamster herding <span class="required">*</span></label>
      <input type="text" id="QA_0003" name="QA_0003" required>
    </div>
    <fieldset class="field">
      <legend>Are you authorized to work in the United States? <span class="required">*</span></legend>
      <label><input type="radio" name="QA_0004" value="yes" required> Yes</label>
      <label><input type="radio" name="QA_0004" value="no"> No</label>
    </fieldset>
    <button type="submit" data-ui="submit-application">Submit application</button>
  </form>
</main>
<script>
  document.getElementById('application-form').addEventListener('submit', function (e) {
    e.preventDefault();
    // Concatenated so the marker phrase is absent from the unsubmitted source.
    document.body.innerHTML = '<div data-ui="application-confirmation"><h2>Thank you!</h2>' +
      '<p>Your application has been ' + 'submitted successfully.</p></div>';
  });
</script>
</body>
</html>

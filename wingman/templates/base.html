<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1c2333">
  <title>{% block title %}Wingman{% endblock %}</title>
  <link rel="stylesheet" href="/static/wingman.css">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="icon" href="/static/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
</head>
<body>
  <header class="topbar">
    <span class="brand">🪽 Wingman</span>
    <nav>
      <a href="/">Inbox</a>
      <a href="/tracker">Tracker</a>
      <a href="/capture">Capture</a>
      <a href="/criteria">Criteria</a>
      <a href="/sources">Sources</a>
      <a href="/profile">Vault</a>
      <a href="/ai">AI</a>
      <a href="/apply">Apply</a>
      <a href="/notify">Notify</a>
      <a href="/metrics">Metrics</a>
      <a href="/events">Log</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    // Root-scope service worker (served at /sw.js) makes the app installable
    // on Android and registers it as a share target for the capture flow.
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
  </script>
</body>
</html>
